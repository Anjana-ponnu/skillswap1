{% extends "base.html" %}
{% block content %}
<h2>Saved Posts</h2>
{% for p in saved_posts %}
  <div>
    <h4>{{ p.title }}</h4>
    <p>By {{ p.user.name }}</p>
    <p>{{ p.content|truncatewords:20 }}</p>
  </div>
{% empty %}
  <p>You have no saved posts.</p>
{% endfor %}
{% endblock %}
