<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Suggested Users</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 0;
    }
    .container {
      width: 60%;
      margin: 50px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .user-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .user-card:last-child {
      border-bottom: none;
    }
    .user-info {
      display: flex;
      align-items: center;
    }
    .user-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 10px;
    }
    .follow-btn button {
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 5px 15px;
      cursor: pointer;
    }
    .follow-btn button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Suggested Users</h2>
    {% for s in suggestions %}
      <div class="user-card">
        <div class="user-info">
          <div class="user-avatar">
            {% if s.profile_picture %}
              <img src="{{ s.profile_picture.url }}" alt="{{ s.username }}" style="width:50px;height:50px;border-radius:50%;">
            {% else %}
              {{ s.username|first|upper }}
            {% endif %}
          </div>
          <div>
            <strong>{{ s.username }}</strong><br>
            <small>{{ s.skills_offered }}</small>
          </div>
        </div>
        <div class="follow-btn">
          <button>Follow</button>
        </div>
      </div>
    {% empty %}
      <p>No users found.</p>
    {% endfor %}
  </div>
</body>
</html>
